name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: |
          npm ci
          npm run start &
          printf 'Waiting for server to start...\n'
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:3000 >/dev/null; then
              printf 'Server started\n'
              break
            fi
            sleep 1
          done
          npm run smoke
